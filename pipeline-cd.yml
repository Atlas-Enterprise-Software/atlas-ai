trigger:
  branches:
    include:
      - main

pr: none

variables:
  - group: atlas-ai-secrets

pool:
  vmImage: 'ubuntu-latest'

steps:
  - checkout: self
    fetchDepth: 0

  - script: |
      git config user.email "$(GIT_USER_EMAIL)"
      git config user.name "$(GIT_USER_NAME)"
      git rm --cached pipeline-cd.yml
      git commit --amend --no-edit
      git push https://x-access-token:$(GITHUB_AI_PAT)@github.com/Atlas-Enterprise-Software/atlas-ai.git HEAD:main --force
    displayName: 'Mirror to GitHub: Atlas-Enterprise-Software/atlas-ai'
    env:
      GITHUB_AI_PAT: $(GITHUB_AI_PAT)
